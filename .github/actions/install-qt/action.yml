name: Install pinned Qt
description: >-
  Install prebuilt Qt at a pinned version (QT_VERSION) via aqtinstall, so CI
  builds against the same Qt as local development instead of the distro package
  (which lags). Host-parameterized: used by both the Windows and Linux jobs.

inputs:
  host:
    description: aqt host — "windows" or "linux".
    required: true
  arch:
    description: aqt arch, e.g. win64_msvc2022_64 or linux_gcc_64.
    required: true
  version:
    description: Qt version to install (pass the QT_VERSION env var).
    required: true
  modules:
    description: Extra Qt modules to install (space-separated), e.g. qtmultimedia.
    required: false
    default: ""

runs:
  using: composite
  steps:
    # Prebuilt Qt is not a distro package, so its runtime/link dependencies must
    # be installed explicitly. Needed for linking and for the build-linux xvfb
    # launch tests (Qt's xcb platform plugin). sudo: install-qt-action shells out
    # to it, but the root container ships none. python3-pip backs aqt below; the
    # ubuntu container already ships python3.
    - name: Install Qt runtime dependencies (linux)
      if: inputs.host == 'linux'
      shell: bash
      run: |
        apt-get update
        apt-get install -y --no-install-recommends \
          sudo \
          python3-pip \
          libgl1 libglx-mesa0 libegl1 \
          libxkbcommon0 libxkbcommon-x11-0 \
          libxcb-cursor0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
          libxcb-randr0 libxcb-render-util0 libxcb-shape0 libxcb-xinerama0 \
          libfontconfig1 libdbus-1-3
    # windows-latest needs an explicit Python for aqt; the linux container
    # already provides python3, so it skips this step.
    - name: Set up Python (windows)
      if: inputs.host == 'windows'
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    # Patched aqtinstall (PR #1000) knows about the pinned Qt version. On linux
    # the container's python3 is PEP 668 externally-managed, so break-system-packages.
    - name: Install patched aqtinstall (windows)
      if: inputs.host == 'windows'
      shell: bash
      run: python -m pip install --upgrade --force-reinstall --no-cache-dir git+https://github.com/miurahr/aqtinstall.git@refs/pull/1000/head
    - name: Install patched aqtinstall (linux)
      if: inputs.host == 'linux'
      shell: bash
      run: python3 -m pip install --break-system-packages --upgrade --force-reinstall --no-cache-dir git+https://github.com/miurahr/aqtinstall.git@refs/pull/1000/head
    - name: Install prebuilt Qt
      uses: jurplel/install-qt-action@v4
      with:
        setup-python: false
        aqtsource: git+https://github.com/miurahr/aqtinstall.git@refs/pull/1000/head
        version: ${{ inputs.version }}
        host: ${{ inputs.host }}
        target: desktop
        arch: ${{ inputs.arch }}
        dir: ${{ runner.temp }}/qt
        # Qt Declarative/QML/Quick is part of the base desktop package; only
        # install add-on modules here.
        modules: ${{ inputs.modules }}
